<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Discover</h1>
<p class="subtitle">Swipe to connect on Kabarak Konnect</p>

<div class="discover-card" id="card">

    <div class="image-container">
        <img id="profileImage" src="aisha.jpg">

        <div class="online-dot"></div>

        <div class="overlay-info">
            <h2 id="name"></h2>
            <p id="meta"></p>
        </div>
    </div>

    <div class="details">
        <p id="bio"></p>

        <div class="extra">
            <span id="tag1"></span>
            <span id="tag2"></span>
            <span id="tag3"></span>
        </div>

        <!-- 🔥 ADDED BUTTONS -->
        <div class="actions">
            <button class="message-btn">💬 Message</button>
            <button class="gif-btn">🎬 GIF</button>
        </div>

    </div>

</div>

<!-- 🔥 BOTTOM NAV -->
<div class="bottom-nav">
    <button>🔥</button>
    <button>💬</button>
    <button>👤</button>
</div>


<script>

const card=document.getElementById("card");

const profiles=[

{
name:"Aisha, 21",
course:"Nursing",
year:"Year 2",
bio:"Soft life vibes ✨",
img:"aisha.jpg",
tags:["📍 Kabarak","🎧 Afrobeats","💬 Deep talks"]
},

{
name:"Brenda, 22",
course:"Law",
year:"Year 3",
bio:"Coffee and deep talks ☕",
img:"brenda.jpg",
tags:["📚 Reading","☕ Coffee","💬 Conversations"]
},

{
name:"Faith, 20",
course:"Computer Science",
year:"Year 1",
bio:"Tech girl energy 💻",
img:"faith.jpg",
tags:["💻 Coding","🎵 Music","❤️ Chill"]
}

];

let current=0;
let startX=0;


/* LOAD PROFILE */
function renderProfile(){

let p=profiles[current];

document.getElementById("name").textContent=p.name;

document.getElementById("meta").textContent=
p.course+" • "+p.year;

document.getElementById("bio").textContent=p.bio;

document.getElementById("profileImage").src=p.img;

document.getElementById("tag1").textContent=p.tags[0];
document.getElementById("tag2").textContent=p.tags[1];
document.getElementById("tag3").textContent=p.tags[2];

}


/* NEXT PROFILE */
function nextProfile(){

current++;

if(current>=profiles.length){
current=0;
}

renderProfile();

card.style.transition="none";
card.style.transform="translateX(0)";

setTimeout(function(){
card.style.transition=".3s";
},30);

}


/* SWIPE */
card.addEventListener("touchstart",function(e){
startX=e.touches[0].clientX;
});

card.addEventListener("touchend",function(e){

let diff=
e.changedTouches[0].clientX-startX;

if(Math.abs(diff)>80){

let dir=diff>0?1:-1;

card.style.transition=".35s";

card.style.transform=
`translateX(${dir*500}px)
rotate(${dir*20}deg)`;

setTimeout(nextProfile,350);

}

});


renderProfile();

</script>

</body>
</html>
