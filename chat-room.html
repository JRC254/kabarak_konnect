<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room - Kabarak Konnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="chat-page">

    <div class="chat-header">
        <a href="messages.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <img src="aisha.jpg" class="header-img" alt="Profile">
        <div class="header-info">
            <h3>Aisha</h3>
            <div class="status-container">
                <span class="status-dot"></span>
                <span class="status-text">Online</span>
            </div>
        </div>
    </div>

    <div class="message-container">
        <div class="message incoming">
            <p>Hey! Are you on campus? 😊</p>
            <span class="msg-time">10:45 AM</span>
        </div>

        <div class="message outgoing">
            <p>Yeah, just leaving the library now. What's up?</p>
            <span class="msg-time">10:46 AM</span>
        </div>

        <div class="message incoming">
            <p>Was wondering if you wanted to grab some coffee at the student center?</p>
            <span class="msg-time">10:47 AM</span>
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" placeholder="Type a message..." class="chat-input">
        <button class="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

</body>
</html>
